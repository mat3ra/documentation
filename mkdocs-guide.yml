validation:
  nav:
    omitted_files: info
    not_found: warn
  links:
    absolute_links: info

site_name: "Platform Guide"
site_url: https://docs.mat3ra.com/guide
site_description: "Step-by-step tutorials, software directory, and CLI reference for the Mat3ra platform."
dev_addr: "localhost:8001"

theme:
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest

extra:
    # Cross-site URL variables (resolved by macros plugin at build time)
    guide_url: https://docs.mat3ra.com/guide
    interface_url: https://docs.mat3ra.com/interface
    reference_url: https://docs.mat3ra.com/reference
    dev_url: https://docs.mat3ra.com/dev
    data_url: https://docs.mat3ra.com/standards




nav:
