validation:
  nav:
    omitted_files: info
    not_found: warn
  links:
    absolute_links: info

site_name: "Tutorials"
site_url: https://docs.mat3ra.com/guide
site_description: "Step-by-step tutorials for DFT, ML, materials construction, and simulation workflows."
dev_addr: "localhost:8001"

theme:
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
    - navigation.expand

extra:
    # Cross-site URL variables (resolved by macros plugin at build time)
    guide_url: https://docs.mat3ra.com/guide
    interface_url: https://docs.mat3ra.com/interface
    reference_url: https://docs.mat3ra.com/reference
    resources_url: https://docs.mat3ra.com/resources
    developers_url: https://docs.mat3ra.com/developers
    cli_url: https://docs.mat3ra.com/command-line
    data_url: https://docs.mat3ra.com/standards




