# Developer Guide — under-the-hood documentation for power users and developers.
# Covers REST API, infrastructure, and data storage internals.
# Deploy to: docs.mat3ra.com/dev/

INHERIT: mkdocs-base.yml

docs_dir: !!python/object/apply:os.getenv ["DOCS_DIR", "lang/en/docs"]

# Exclude pages that belong to other sites (Guide or Concepts).
# Cross-site links use absolute URLs instead.
exclude_docs: |
  accounts/
  benchmarks/
  cli/
  collaboration/
  data/
  data-structured/
  entities-general/
  getting-started/
  jobs/
  jobs-cli/
  jobs-designer/
  jupyterlite/
  materials/
  materials-designer/
  methods/
  methods-directory/
  models/
  models-directory/
  other/
  pricing/
  properties/
  properties-directory/
  remote-connection/
  security/
  site-policy/
  software/
  software-directory/
  tutorials/
  ui/
  workflow-designer/
  workflows/
  migrating-to-new-platform.md

  # Guide-only pages in shared dirs
  data-in-objectstorage/actions/
  data-in-objectstorage/ui/

  # Other sites' homepages
  index.md
  index-guide.md
  index-concepts.md

validation:
  nav:
    omitted_files: info
    not_found: warn
  links:
    absolute_links: info

site_name: "Developer Guide"
site_url: https://docs.mat3ra.com/dev
site_description: "Developer-focused documentation for the Mat3ra platform: REST API, infrastructure, and data storage."
dev_addr: "localhost:8003"

extra:
    # Cross-site URL variables (resolved by macros plugin at build time)
    guide_url: https://docs.mat3ra.com/guide
    reference_url: https://docs.mat3ra.com/reference
    dev_url: https://docs.mat3ra.com/dev




nav:
    - "← All Docs":                                      /
    - Home:                                              index-dev.md

